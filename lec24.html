<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          #unit{
        background-color: red;
        height: 200px; 
        width: 200px;
        animation-name: kuchbhi;
        animation-duration: 2s;
        animation-timing-function: ease-in;
        animation-delay: 1s;
        animation-iteration-count: infinite;
        border-radius:50% ;
        align-items: center;
        justify-content: center;

          }
          @keyframes kuchbhi{
            10% {
        background-color: burlywood;
        transform: translate(0px,300px) rotate(20deg);;
      }
      20% {
        background-color: aquamarine;
        transform: translate(100px,0px) rotate(30deg);
      }

      40% {
        background-color: bisque;
        transform: translate(200px,300px) rotate(360deg);;
      }
      60%{
        background-color: blueviolet;
        transform: translate(300px,0px) rotate(60deg);;
      }
      80%{
        background-color: blue;
        transform: translate(400px,400px) rotate(90deg);;
      }
      100%{
        background-color: pink;
        transform: translate(500px,0px) rotate(100deg);;
      }
    }

          
            
       
          
          
    </style>

</head>
<body>
     <div id="unit">
        
    </div>
    

</body>
</html>
